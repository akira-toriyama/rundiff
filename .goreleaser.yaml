version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: rundiff
    main: ./cmd/rundiff
    binary: rundiff
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X github.com/akira-toriyama/rundiff/internal/version.Version={{ .Version }}
      - -X github.com/akira-toriyama/rundiff/internal/version.Commit={{ .FullCommit }}
      - -X github.com/akira-toriyama/rundiff/internal/version.Date={{ .Date }}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# Homebrew cask pushed to the family tap on release. GoReleaser v2 ships prebuilt
# binaries as CASKS (the old `brews:` formula path is deprecated). The live
# Casks/rundiff.rb in akira-toriyama/homebrew-tap is regenerated each release.
# Install: brew install akira-toriyama/tap/rundiff
homebrew_casks:
  - repository:
      owner: akira-toriyama
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/akira-toriyama/rundiff
    description: "Diff a command's output against its previous run — fixed/new/unchanged for AI coding agents"
    commit_author:
      name: akira-toriyama
      email: imatomiyuichi@gmail.com
    commit_msg_template: "homebrew: update {{ .ProjectName }} cask to {{ .Tag }}"
    # The binary is unsigned; strip the quarantine xattr on macOS so Gatekeeper
    # allows launch (same pattern as the family's other casks).
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/rundiff"]
          end

release:
  # First-class published release on tag push (not a rolling draft): the tag IS
  # the cut, so binaries + cask land in one step.
  draft: false
