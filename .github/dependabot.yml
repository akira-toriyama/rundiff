# Canonical standard file managed by fleet-sync (.github/workflows/fleet-sync.yml).
# Do NOT edit per-repo copies — edit THIS file; fleet-sync propagates it to every
# owned, non-fork, non-archived repo WITH a root go.mod (repos without one get
# fleet/dependabot.yml — the same file minus the gomod ecosystem, because gomod
# configured without a go.mod is a weekly FAILING run, not a no-op; t-s3fp).
# Synced to: .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Wait 7 days after a release before proposing it — freshly published
    # versions are where supply-chain compromises surface (xz, tj-actions).
    cooldown:
      default-days: 7
    # Batch every action bump into ONE weekly PR (not one PR per action).
    groups:
      actions:
        patterns: ["*"]
    # gitmoji + Conventional Commits so bot PRs match the house convention
    # (CONTRIBUTING.md). Bots are exempt from commit-lint, so this is decoration.
    commit-message:
      prefix: ":arrow_up: build(deps)"

  # Go module updates for the Go tools (pare, furrow, glyph, …): dependency +
  # security updates, batched into one weekly PR. Only synced to repos that
  # actually have a root go.mod (see the header note).
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    # Same 7-day supply-chain cooldown as github-actions above.
    cooldown:
      default-days: 7
    groups:
      gomod:
        patterns: ["*"]
    commit-message:
      prefix: ":arrow_up: build(deps)"
