# git-cliff — derive the next version + release notes from gitmoji + Conventional
# Commits (https://github.com/akira-toriyama/.github/blob/main/CONTRIBUTING.md). Used by .github/workflows/release.yml in a
# rolling model: no CHANGELOG.md is committed; notes are generated on the fly at
# release time.

[changelog]
header = """
# Changelog

Release history of rundiff.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
# semver is decided by the Conventional type; the gitmoji is for readability.
conventional_commits = true
# Keep non-Conventional commits in scope; the parsers below skip them.
filter_unconventional = false
protect_breaking_commits = true
topo_order = false
sort_commits = "oldest"
tag_pattern = "v[0-9]*"

# Strip a leading gitmoji (:code: form or a bare glyph) so the Conventional
# parser sees the bare type.
commit_preprocessors = [
  { pattern = '^:[\w-]+:\s*', replace = "" },
  { pattern = '^[^\x00-\x7F]+\s*', replace = "" },
]

commit_parsers = [
  # exclude bot auto-commits (avoid version churn)
  { field = "author.name", pattern = "github-actions|web-flow|.*\\[bot\\]", skip = true },
  { field = "author.email", pattern = "actions@github|noreply@github", skip = true },

  # types that appear in releases
  { message = "^feat", group = "✨ Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^revert", group = "⏪ Revert" },

  # non-bumping types: excluded from the changelog
  { message = "^docs", skip = true },
  { message = "^style", skip = true },
  { message = "^refactor", skip = true },
  { message = "^test", skip = true },
  { message = "^build", skip = true },
  { message = "^ci", skip = true },
  { message = "^chore", skip = true },

  # anything else: excluded
  { message = ".*", skip = true },
]

[bump]
# New pre-1.0 project — first publish becomes v0.1.0 (matches the family's jig).
initial_tag = "v0.1.0"
features_always_bump_minor = true
breaking_always_bump_major = true
