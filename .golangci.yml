# golangci-lint v2 config for rundiff. Conservative, fast linters that catch real
# bugs and keep style consistent without fighting the developer.
version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - revive
  settings:
    errcheck:
      # Writes to stdout/stderr via fmt.Fprint* in a CLI are best-effort (a
      # broken pipe is not actionable); don't require checking them.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        # cobra RunE handlers have a fixed (cmd, args) signature; an unused one
        # is unavoidable, not a smell.
        - name: unused-parameter
          disabled: true
  exclusions:
    rules:
      # tests may ignore errors freely.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
